<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Smart Land Area Calculator</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2ecc71">
</head>
<body>
    <!-- Landing Page: Spline Only -->
    <div id="landing-page" class="landing-page">
        <canvas id="canvas3d"></canvas>
    </div>

    <div id="app">
        <!-- Map Container -->
        <div id="map"></div>

        <!-- UI Overlay -->
        <div class="ui-overlay">
            <!-- Top Controls: Mode Switch & Language -->
            <div class="top-controls">
                <div class="mode-switch">
                    <button id="draw-mode-btn" class="active" onclick="setMode('draw')">
                        <i class="fas fa-pencil-alt"></i> <span data-i18n="draw">Draw</span>
                    </button>
                    <button id="walk-mode-btn" onclick="setMode('walk')">
                        <i class="fas fa-walking"></i> <span data-i18n="walk">Walk</span>
                    </button>
                </div>
                <div id="accuracy-badge" class="accuracy-badge">
                    <span id="accuracy-text">📍 Accuracy: ±--m</span>
                </div>
                <div class="lang-switch">
                    <button id="lang-btn" onclick="toggleLanguage()">EN</button>
                </div>
            </div>

            <!-- Results Overlay Modal (Premium Glassmorphism) -->
            <div id="result-overlay" class="result-overlay hidden" onclick="hideResultsPanel(event)">
                <div id="results-panel" class="premium-glass-card" onclick="event.stopPropagation()">
                    <button class="close-card-btn" onclick="hideResultsPanel()">&times;</button>
                    
                    <!-- Decorative Soft Gradient Glows -->
                    <div class="card-glow glow-1"></div>
                    <div class="card-glow glow-2"></div>
                    
                    <div class="card-content">
                        <h3 class="card-title" data-i18n="results">Measurement Results</h3>
                        
                        <div class="premium-stats">
                            <div class="p-stat main-stat">
                                <span class="p-value" id="area-acres">0.000</span>
                                <span class="p-label" data-i18n="acres">Acres</span>
                            </div>
                            
                            <div class="p-stat-grid">
                                <div class="p-stat">
                                    <span id="area-guntas" class="p-value">0</span>
                                    <span class="p-label" data-i18n="guntas">Guntas</span>
                                </div>
                                <div class="p-stat">
                                    <span id="area-hectares" class="p-value">0.00</span>
                                    <span class="p-label" data-i18n="hectares">Hectares</span>
                                </div>
                                <div class="p-stat">
                                    <span id="area-sqft" class="p-value">0</span>
                                    <span class="p-label" data-i18n="sqft">Sq. Feet</span>
                                </div>
                                <div class="p-stat">
                                    <span id="dist-walked" class="p-value">0m</span>
                                    <span class="p-label" data-i18n="distance">Distance</span>
                                </div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <button onclick="shareOnWhatsApp()" class="premium-btn">
                                <i class="fab fa-whatsapp"></i> <span data-i18n="share">Share Report</span>
                            </button>
                            <div class="premium-tag">
                                <i class="fas fa-signal"></i> <span id="gps-accuracy-val">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI Result Card (Hidden by default, used by JS) -->
            <div id="ai-result-card" class="ai-card hidden">
                <div class="ai-card-header">
                    <i class="fas fa-robot"></i> AI Assistant
                    <button onclick="closeAICard()" class="close-ai">&times;</button>
                </div>
                <div id="ai-loading" class="ai-loading hidden">
                     <div class="spinner"></div>
                     <span>Asking Claude...</span>
                </div>
                <div id="ai-content" class="ai-content"></div>
            </div>

            <!-- Floating Bottom Panel -->
            <div class="bottom-panel">
                <div class="bottom-actions glassmorphism">
                    <div id="draw-controls" class="action-group">
                        <button id="undo-draw-btn" class="btn-icon" onclick="undoLastPoint()" disabled>
                            <i class="fas fa-undo-alt"></i> <span data-i18n="undo">Undo</span>
                        </button>
                        <button id="reset-draw-btn" class="btn-icon" onclick="resetMeasurement()">
                            <i class="fas fa-trash-alt"></i> <span data-i18n="reset">Reset</span>
                        </button>
                        <button id="save-draw-btn" class="btn-icon btn-action" onclick="showSaveDialog()">
                            <i class="fas fa-save"></i> <span data-i18n="save">Save</span>
                        </button>
                        <button id="view-results-btn" class="btn-icon btn-highlight" onclick="showResultsPanel()">
                            <i class="fas fa-chart-area"></i> <span>Results</span>
                        </button>
                    </div>

                    <div id="walk-controls" class="action-group hidden">
                        <button id="start-walk-btn" class="btn-icon btn-action" onclick="startWalking()">
                            <i class="fas fa-play"></i> <span>Start</span>
                        </button>
                        <button id="stop-walk-btn" class="btn-icon btn-danger hidden" onclick="stopWalking()">
                            <i class="fas fa-stop"></i> <span>Stop</span>
                        </button>
                        <button id="edit-walk-btn" class="btn-icon hidden" onclick="toggleEditMode()">
                            <i class="fas fa-edit"></i> <span>Edit</span>
                        </button>
                        <button id="view-walk-results-btn" class="btn-icon btn-highlight" onclick="showResultsPanel()">
                            <i class="fas fa-chart-area"></i> <span>Results</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- History Toggle -->
            <button id="history-toggle" class="history-toggle" onclick="toggleHistory()">
                <i class="fas fa-history"></i>
            </button>
        </div>

        <!-- Summary Overlay -->
        <div id="summary-overlay" class="summary-overlay hidden">
            <div class="summary-header">
                <h2 data-i18n="summary">Measurement Summary</h2>
                <p id="summary-date">--</p>
            </div>
            <div class="summary-cards">
                <div class="summary-card">
                    <i class="fas fa-chart-area"></i>
                    <div class="details">
                        <h4 data-i18n="total_area">Total Area</h4>
                        <p><span id="summary-acres">0.000</span> <span data-i18n="acres">Acres</span></p>
                        <p style="font-size: 14px; color: #666;"><span id="summary-guntas">0</span> <span data-i18n="guntas">Guntas</span> | <span id="summary-hectares">0.00</span> <span data-i18n="hectares">Hectares</span></p>
                        <p style="font-size: 14px; color: #666;"><span id="summary-sqft">0</span> <span data-i18n="sqft">Sq. Feet</span></p>
                    </div>
                </div>
                <div class="summary-card">
                    <i class="fas fa-ruler-combined"></i>
                    <div class="details">
                        <h4 data-i18n="total_distance">Total Distance</h4>
                        <p id="summary-distance">0m</p>
                    </div>
                </div>
                <div class="summary-card">
                    <i class="fas fa-bullseye"></i>
                    <div class="details">
                        <h4 data-i18n="avg_accuracy">Avg. Accuracy</h4>
                        <p id="summary-accuracy">Good</p>
                    </div>
                </div>
            </div>
            <div class="summary-footer">
                <button class="btn-primary" onclick="downloadResultImage()">
                    <i class="fas fa-download"></i> <span data-i18n="download_image">Download Result</span>
                </button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-secondary" style="flex: 1;" onclick="exportKML()">
                        <i class="fas fa-file-code"></i> <span>KML</span>
                    </button>
                    <button class="btn-secondary" style="flex: 1;" onclick="exportGeoJSON()">
                        <i class="fas fa-globe"></i> <span>GeoJSON</span>
                    </button>
                </div>
                <button class="btn-primary" style="background-color: #3498db;" onclick="showSaveDialog()">
                    <i class="fas fa-save"></i> <span data-i18n="save_history">Save to History</span>
                </button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-secondary" style="flex: 1;" onclick="shareOnWhatsApp()">
                        <i class="fab fa-whatsapp"></i> <span data-i18n="share">Share</span>
                    </button>
                    <button class="btn-secondary" style="flex: 1;" onclick="closeSummary()">
                        <i class="fas fa-times"></i> <span data-i18n="close">Close</span>
                    </button>
                    <button class="btn-secondary" style="flex: 1; background-color: #f39c12; color: white;" onclick="measureAgain()">
                        <i class="fas fa-redo"></i> <span data-i18n="measure_again">Measure Again</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- History Sidebar -->
        <div id="history-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3 data-i18n="history">Saved Lands</h3>
                <button onclick="toggleHistory()">&times;</button>
            </div>
            <div id="history-list" class="history-list">
                <!-- Items added dynamically -->
            </div>
        </div>

        <!-- Save Dialog Modal -->
        <div id="save-modal" class="modal hidden">
            <div class="modal-content">
                <h3 data-i18n="save_land">Save Land</h3>
                <input type="text" id="land-name" placeholder="Enter land name" />
                <div class="modal-actions">
                    <button onclick="hideSaveDialog()" class="btn-secondary" data-i18n="cancel">Cancel</button>
                    <button onclick="confirmSave()" class="btn-primary" data-i18n="confirm">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Spline Runtime -->
    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.0.94/build/runtime.js';
        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);
        app.load('https://prod.spline.design/3Z0eyftkGqgceCfQ/scene.splinecode');
    </script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Draw JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- Turf.js for spatial calculations -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <!-- html2canvas for capturing results -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/translations.js"></script>
    <script src="/static/js/map_logic.js"></script>
    <script src="/static/js/gps_logic.js"></script>
    <script src="/static/js/voice_logic.js"></script>
    <script src="/static/js/script.js"></script>
</body>
</html>
